<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Client-side translation workspace for text and structured text files using Gemini, OpenAI-compatible, and Anthropic-compatible endpoints.">
    <meta name="theme-color" content="#1e8f7a">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="stylesheet" href="/src/index.css" />
    <script>
        (function() {
            var t = localStorage.getItem("theme");
            if (t === "light") document.documentElement.setAttribute("data-theme", "light");
        })();
    </script>
    <title>TranslationTXT</title>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
